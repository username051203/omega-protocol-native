name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew || true

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/omega.keystore

      - name: Build release APK
        env:
          KEYSTORE_PATH: omega.keystore
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk OmegaProtocol.apk

      - name: Delete old latest release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --repo ${{ github.repository }}

      - name: Create new latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest OmegaProtocol.apk \
            --title "Omega Protocol Native — Latest Build" \
            --notes "Native Java Android build. Auto-published on push to main." \
            --repo ${{ github.repository }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmegaProtocol-APK
          path: OmegaProtocol.apk
          retention-days: 30
